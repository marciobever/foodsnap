version: '3.9'
services:
  puppeteer-renderer:
    build:
      context: .
      dockerfile_inline: |
        FROM ghcr.io/puppeteer/puppeteer:24.37.5
        
        USER root
        WORKDIR /app
        
        RUN npm init -y \
          && npm i express cors puppeteer@24.37.5
        
        RUN cat > index.js << 'EOF'
        const express = require("express");
        const cors = require("cors");
        const puppeteer = require("puppeteer");
        
        const app = express();
        app.use(cors());
        app.use(express.json({ limit: "10mb" }));
        
        app.get("/health", (_, res) => res.status(200).json({ ok: true }));
        
        app.post("/api/render", async (req, res) => {
          let browser;
          try {
            const { html, width = 800, height = 600, scale = 2 } = req.body || {};
            if (!html) return res.status(400).json({ error: "Missing html" });
        
            browser = await puppeteer.launch({
              headless: "new",
              args: ["--no-sandbox", "--disable-setuid-sandbox", "--disable-dev-shm-usage"],
            });
        
            const page = await browser.newPage();
            await page.setViewport({ width, height, deviceScaleFactor: scale });
            await page.setContent(html, { waitUntil: "networkidle0" });
            
            // Auto-resize viewport height to fit content height exactly
            const bodyHeight = await page.evaluate(() => document.documentElement.scrollHeight);
            await page.setViewport({ width, height: bodyHeight, deviceScaleFactor: scale });
        
            const buf = await page.screenshot({ type: "png", omitBackground: true });
            res.setHeader("Content-Type", "image/png");
            res.send(buf);
          } catch (e) {
            res.status(500).json({ error: e.message });
          } finally {
            if (browser) await browser.close();
          }
        });
        
        const PORT = process.env.PORT || 3001;
        app.listen(PORT, "0.0.0.0", () => console.log("Renderer on", PORT));
        EOF
        
        RUN chown -R pptruser:pptruser /app
        USER pptruser
        
        EXPOSE 3001
        CMD ["node", "index.js"]
    environment:
      NODE_ENV: production
      PORT: 3001
    ports:
      - '3001:3001'
    restart: unless-stopped
    mem_limit: 512m
